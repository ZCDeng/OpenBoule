<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenConsult · Boule — 架构一图看懂</title>
<script>
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<style>
  :root {
    --bg: #FAF9F5; --surface: #FFFFFF; --surface2: #F1EFE8;
    --ink: #14140F; --body: #3D3D38; --muted: #87867C;
    --line: #D2D0C5; --line-soft: #E7E4DA;
    --accent: #2F4BE0; --accent-soft: rgba(47,75,224,0.10);
    --gate: #E8590C; --gate-soft: rgba(232,89,12,0.12);
    --olive: #5E7D52; --olive-soft: rgba(94,125,82,0.12);
    --zone: rgba(20,20,15,0.022); --zone-line: #D2D0C5;
    --serif: "Songti SC", ui-serif, Georgia, serif;
    --sans: system-ui, -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  html.dark {
    --bg: #14140F; --surface: #1F1F1B; --surface2: #2A2A25;
    --ink: #FAF9F5; --body: #D2D0C5; --muted: #8C8B80;
    --line: #3D3D38; --line-soft: #2A2A25;
    --accent: #7E97FF; --accent-soft: rgba(126,151,255,0.16);
    --gate: #FF922B; --gate-soft: rgba(255,146,43,0.16);
    --olive: #9DB07C; --olive-soft: rgba(157,176,124,0.16);
    --zone: rgba(250,249,245,0.03); --zone-line: #3D3D38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--body); font-family: var(--sans);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; overflow: hidden;
  }

  .bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--line-soft); flex: none;
  }
  .bar h1 { font-family: var(--serif); font-weight: 600; font-size: 19px; color: var(--ink); letter-spacing: -0.01em; }
  .bar .sub { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.04em; }
  .spacer { flex: 1; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.02em;
    padding: 5px 11px; border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--muted); cursor: pointer; transition: all .15s ease;
  }
  .chip:hover { color: var(--ink); border-color: var(--muted); }
  .chip.on { background: var(--ink); border-color: var(--ink); color: var(--bg); }
  #themeToggle {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em;
    padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: transparent; color: var(--muted); cursor: pointer;
  }
  #themeToggle:hover { color: var(--ink); border-color: var(--muted); }

  .stage { flex: 1; position: relative; min-height: 0; }
  .stage svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .zone rect { fill: var(--zone); stroke: var(--zone-line); stroke-width: 1; stroke-dasharray: 5 5; rx: 16; }
  .zone .ztitle { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; fill: var(--muted); }
  .zone .zsub { font-family: var(--mono); font-size: 10px; fill: var(--muted); opacity: 0.75; }

  .node { cursor: pointer; }
  .node rect { fill: var(--surface); stroke: var(--line); stroke-width: 1.5; rx: 10; transition: stroke .15s ease, filter .15s ease; }
  .node:hover rect { stroke: var(--muted); }
  .node.sel rect { stroke: var(--accent) !important; stroke-width: 2.4; }
  .node .t  { font-family: var(--sans); font-size: 14.5px; font-weight: 700; fill: var(--ink); pointer-events: none; }
  .node .m  { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); pointer-events: none; }
  .node .k  { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.06em; fill: var(--accent); pointer-events: none; }
  .node .kg { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.06em; fill: var(--gate); pointer-events: none; }
  .node.gate rect { fill: var(--gate-soft); stroke: var(--gate); }
  .node.store rect { fill: var(--surface2); }
  .node.do rect { fill: var(--accent-soft); stroke: var(--accent); }
  .node.deliver rect { fill: var(--olive-soft); stroke: var(--olive); }
  .node.ext rect { stroke-dasharray: 6 3; }

  .edge { stroke: var(--muted); stroke-width: 1.6; fill: none; marker-end: url(#a-mut); transition: opacity .2s ease, stroke .2s ease; }
  .edge.dash { stroke-dasharray: 5 4; }
  .edge.spine { stroke-width: 2; }
  .elbl { font-family: var(--mono); font-size: 10px; fill: var(--muted); transition: opacity .2s ease; }

  .stage.flowing .edge { opacity: 0.12; }
  .stage.flowing .elbl { opacity: 0.12; }
  .stage.flowing .node { opacity: 0.28; }
  .stage.flowing .zone { opacity: 0.45; }
  .stage.flowing .edge.lit {
    opacity: 1; stroke: var(--accent); marker-end: url(#a-acc);
    stroke-dasharray: 7 5; animation: march 0.9s linear infinite;
  }
  .stage.flowing .edge.lit.back { stroke: var(--gate); marker-end: url(#a-gate); }
  .stage.flowing .elbl.lit { opacity: 1; fill: var(--accent); }
  .stage.flowing .node.lit { opacity: 1; }
  .stage.flowing .node.lit rect { stroke: var(--accent); }
  @keyframes march { to { stroke-dashoffset: -12; } }
  @media (prefers-reduced-motion: reduce) { .stage.flowing .edge.lit { animation: none; } }

  .card {
    position: absolute;
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  }
  #detail { right: 16px; bottom: 16px; width: 340px; max-width: calc(100vw - 32px); }
  #detail h3 { font-family: var(--serif); font-weight: 600; font-size: 17px; color: var(--ink); margin-bottom: 2px; }
  #detail .meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  #detail p { font-size: 12.5px; line-height: 1.6; }
  #detail p code, #flowcap code { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  #flowcap { left: 16px; bottom: 16px; max-width: 470px; display: none; }
  #flowcap.show { display: block; }
  #flowcap .fname { font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px; }
  #flowcap ol { margin-left: 18px; }
  #flowcap li { font-size: 12.5px; line-height: 1.6; }
  .src { position: absolute; top: 10px; right: 16px; font-family: var(--mono); font-size: 10px; color: var(--muted); opacity: 0.8; }
  @media (max-width: 900px) {
    body { overflow: auto; }
    .stage { min-height: 78vh; }
    #detail { position: static; width: auto; margin: 10px 16px; }
    #flowcap { position: static; margin: 0 16px 16px; }
  }
</style>
</head>

<script>
const DETAIL = {
  web:        { t:"Web 控制台", m:"surface · React SPA", b:"指挥中心。沉淀需求、材料、状态与交付，SSE 实时看每个阶段的事件、成本、来源结论。审批/重跑/补充调研都在这里拍板。" },

const stage = document.getElementById('stage');
const nodes = document.querySelectorAll('.node');
const edges = document.querySelectorAll('.edge');
const elbls = document.querySelectorAll('.elbl');
const chips = document.querySelectorAll('.chip');
const fcap = document.getElementById('flowcap');

function setFlow(key) {
  chips.forEach(c => c.classList.toggle('on', c.dataset.flow === key));
  edges.forEach(e => e.classList.remove('lit'));
  elbls.forEach(l => l.classList.remove('lit'));
  nodes.forEach(n => n.classList.remove('lit'));
  if (key === 'all') { stage.classList.remove('flowing'); fcap.classList.remove('show'); return; }
  const f = FLOWS[key];
  stage.classList.add('flowing');
  f.edges.forEach(id => document.getElementById(id)?.classList.add('lit'));
  elbls.forEach(l => { if (f.edges.includes(l.dataset.e)) l.classList.add('lit'); });
  f.nodes.forEach(k => document.querySelector(`.node[data-k="${k}"]`)?.classList.add('lit'));
  document.getElementById('f-name').textContent = f.name;
  document.getElementById('f-steps').innerHTML = f.steps.map(s => `<li>${s}</li>`).join('');
  fcap.classList.add('show');
}
chips.forEach(c => c.addEventListener('click', () => setFlow(c.dataset.flow)));

nodes.forEach(n => n.addEventListener('click', () => {
  nodes.forEach(x => x.classList.remove('sel'));
  n.classList.add('sel');
  const d = DETAIL[n.dataset.k];
  if (!d) return;
  document.getElementById('d-title').textContent = d.t;
  document.getElementById('d-meta').textContent = d.m;
  document.getElementById('d-body').innerHTML = d.b;
}));

document.getElementById('themeToggle').addEventListener('click', () => {
  const dark = !document.documentElement.classList.contains('dark');
  document.documentElement.classList.toggle('dark', dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
});
</script>
